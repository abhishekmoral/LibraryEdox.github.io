name: edox_library
description: "EdoxLibrary - Smart Library Seat Management SaaS Application"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

#------------- Packages ---------------#

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.1
  firebase_messaging: ^16.2.2

  # State Management
  flutter_bloc: ^8.1.3
  get_it: ^7.7.0
  get_storage: ^2.1.1
  collection: ^1.18.0

  # Icons
  cupertino_icons: ^1.0.8
  iconsax: ^0.0.8

  # UI Components
  fl_chart: ^0.70.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  lottie: ^3.3.2

  # Utilities
  http: ^1.3.0
  intl: ^0.20.2
  logger: ^2.7.0
  url_launcher: ^6.3.2
  connectivity_plus: ^6.1.4
  uuid: ^4.5.1
  razorpay_flutter: ^1.3.7

#-------------./  Packages End ---------------#

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  #------------ Local Assets ---------#
  assets:
    - assets/logos/
    - assets/icons/
    - assets/images/illustrations/
    - assets/images/avatars/

  #-------------- Local Fonts -------------#
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
